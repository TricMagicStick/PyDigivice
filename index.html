<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PyDigivice</title>
    <style>
        body {font-family: monospace; background: #000; color: #0f0; text-align: center; margin: 0; padding: 10px;}
        .digivice {max-width: 400px; margin: 20px auto; border: 12px solid #222; border-radius: 30px; background: #0a0a0a; padding: 15px; box-shadow: 0 0 40px #0f0;}
        .screen {background: #001100; border: 6px solid #0f0; padding: 20px; min-height: 320px; font-size: 15px; position: relative;}
        .ascii {font-size: 24px; line-height: 1.05; margin: 15px 0; white-space: pre; color: #0f0; text-shadow: 0 0 5px #0f0;}
        button {background: #111; color: #0f0; border: 3px solid #0f0; padding: 14px; margin: 6px; font-size: 17px; width: 45%; border-radius: 12px;}
        button:active {background: #0f0; color: #000;}
        .header {color: #0f0; font-size: 26px; margin: 10px; text-shadow: 0 0 10px #0f0;}
    </style>
</head>
<body>
    <div class="digivice">
        <div class="header">🔴 PYDIGIVICE 🔴</div>
        <div class="screen" id="screen">
            <div id="ascii" class="ascii"></div>
            <div id="name-stage" style="font-size:24px;margin:12px 0;"></div>
            <div id="stats" style="line-height:1.6; font-size:17px;"></div>
        </div>
        
        <div style="margin-top:15px;">
            <button onclick="feed()">🍖 Feed</button>
            <button onclick="play()">⚔️ Train</button><br>
            <button onclick="rest()">💤 Rest</button>
            <button onclick="battle()">🏆 Battle</button>
        </div>
        <button onclick="saveGame()" style="width:92%; margin-top:10px; font-size:18px;">💾 Save Progress</button>
    </div>

    <script>
        let digi = {name:"Agumon",stage:"Rookie",hunger:80,happiness:70,energy:85,strength:50,age:0,lastTime:Date.now()};
        const sprites = {
            "Egg": "   .-.
  /   \
 (     )
  \___/",
            "Rookie": "   /\\_/\\
  ( o.o )
   > ^ <
  /  |  \\
 (   |   )",
            "Champion": "   /\\_/\\
  ( o.o )
   > ^ <
  /  |  \\
 /___|___\\
  |  |  |"
        };

        function update() {
            const delta = Math.floor((Date.now() - digi.lastTime) / 60000);
            digi.lastTime = Date.now();
            if (delta > 0) {
                digi.hunger = Math.max(0, digi.hunger - delta * 2);
                digi.happiness = Math.max(0, digi.happiness - delta * 1.5);
                digi.energy = Math.max(0, digi.energy - delta);
                digi.age += delta;
            }

            if (digi.stage === "Egg" && digi.happiness > 55 && digi.hunger > 45) digi.stage = "Rookie";
            if (digi.stage === "Rookie" && digi.strength > 60 && digi.happiness > 80) digi.stage = "Champion";

            document.getElementById("ascii").textContent = sprites[digi.stage] || "???";
            document.getElementById("name-stage").textContent = digi.name + " (" + digi.stage + ")";
            document.getElementById("stats").innerHTML = `
                Age: ${Math.floor(digi.age/60)}h ${digi.age%60}m<br>
                Hunger: ${Math.floor(digi.hunger)} 🍖<br>
                Happiness: ${Math.floor(digi.happiness)} 😊<br>
                Energy: ${Math.floor(digi.energy)} ⚡<br>
                Strength: ${Math.floor(digi.strength)} 💪
            `;
        }

        function feed(){digi.hunger=Math.min(100,digi.hunger+28); digi.happiness=Math.min(100,digi.happiness+12); update(); saveGame();}
        function play(){if(digi.energy<20)return alert("Too tired!"); digi.happiness=Math.min(100,digi.happiness+28); digi.strength=Math.min(100,digi.strength+18); digi.energy=Math.max(0,digi.energy-22); update(); saveGame();}
        function rest(){digi.energy=Math.min(100,digi.energy+45); digi.hunger=Math.max(0,digi.hunger-10); update(); saveGame();}
        function battle(){
            if(digi.energy<30 || digi.hunger>65) return alert("Too weak to battle!");
            if(Math.random()<0.7){digi.strength=Math.min(100,digi.strength+22); digi.happiness=Math.min(100,digi.happiness+15); alert("🏆 Victory!");}
            else {digi.happiness=Math.max(0,digi.happiness-22); alert("Defeated... Train harder!");}
            update(); saveGame();
        }
        function saveGame(){localStorage.setItem("digiSave",JSON.stringify(digi));}
        function load(){const s=localStorage.getItem("digiSave"); if(s) digi=JSON.parse(s); update();}
        
        setInterval(update, 30000);
        window.onload = load;
    </script>
</body>
</html>
