<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PyDigivice</title>
    <style>
        body {font-family: monospace; background: #000; color: #0f0; text-align: center; margin: 0; padding: 10px;}
        .digivice {max-width: 380px; margin: 20px auto; border: 8px solid #333; border-radius: 20px; background: #111; padding: 15px; box-shadow: 0 0 30px #0f0;}
        .screen {background: #001100; border: 4px solid #0f0; padding: 15px; min-height: 280px; font-size: 14px;}
        .ascii {font-size: 18px; line-height: 1; margin: 10px 0; white-space: pre;}
        button {background: #222; color: #0f0; border: 2px solid #0f0; padding: 12px; margin: 5px; font-size: 16px; width: 45%; border-radius: 8px;}
        button:active {background: #0f0; color: #000;}
    </style>
</head>
<body>
    <div class="digivice">
        <h1 style="color:#0f0;">🔴 PYDIGIVICE 🔴</h1>
        <div class="screen" id="screen">
            <div id="ascii" class="ascii"></div>
            <div id="name-stage" style="font-size:18px;margin:8px;"></div>
            <div id="stats" style="line-height:1.5;"></div>
        </div>
        <div>
            <button onclick="feed()">🍖 Feed</button>
            <button onclick="play()">⚔️ Train</button><br>
            <button onclick="rest()">💤 Rest</button>
            <button onclick="battle()">🏆 Battle</button>
        </div>
        <button onclick="saveGame()" style="width:90%;margin-top:10px;">💾 Save</button>
    </div>

    <script>
        let digi = {name:"Agumon",stage:"Rookie",hunger:70,happiness:60,energy:80,strength:40,age:0,lastTime:Date.now()};
        const arts = {"Egg":"   \n ( )\n/___\\","Rookie":" /\\_/\\ \n( o.o ) \n > ^ < ","Champion":" /\\_/\\ \n( o.o ) \n > ^ < \n  / \\"};

        function update() {
            const delta = Math.floor((Date.now() - digi.lastTime)/60000);
            digi.lastTime = Date.now();
            if (delta > 0) {
                digi.hunger = Math.max(0, digi.hunger - delta*3);
                digi.happiness = Math.max(0, digi.happiness - delta*2);
                digi.energy = Math.max(0, digi.energy - delta);
                digi.age += delta;
            }
            if (digi.stage === "Egg" && digi.happiness > 50 && digi.hunger > 40) digi.stage = "Rookie";
            if (digi.stage === "Rookie" && digi.strength > 55 && digi.happiness > 75) digi.stage = "Champion";

            document.getElementById("ascii").textContent = arts[digi.stage] || "???";
            document.getElementById("name-stage").textContent = digi.name + " (" + digi.stage + ")";
            document.getElementById("stats").innerHTML = `
                Age: ${Math.floor(digi.age/60)}h ${digi.age%60}m<br>
                Hunger: ${Math.floor(digi.hunger)}<br>
                Happiness: ${Math.floor(digi.happiness)}<br>
                Energy: ${Math.floor(digi.energy)}<br>
                Strength: ${Math.floor(digi.strength)}
            `;
        }

        function feed(){digi.hunger=Math.min(100,digi.hunger+25); digi.happiness=Math.min(100,digi.happiness+10); update();}
        function play(){if(digi.energy<20)return alert("Too tired!"); digi.happiness=Math.min(100,digi.happiness+25); digi.strength=Math.min(100,digi.strength+15); digi.energy=Math.max(0,digi.energy-20); update();}
        function rest(){digi.energy=Math.min(100,digi.energy+40); digi.hunger=Math.max(0,digi.hunger-8); update();}
        function battle(){
            if(digi.energy<25 || digi.hunger>70) return alert("Too weak!");
            if(Math.random()<0.65){digi.strength=Math.min(100,digi.strength+18); digi.happiness=Math.min(100,digi.happiness+12); alert("🏆 Won!");}
            else {digi.happiness=Math.max(0,digi.happiness-18); alert("Lost...");}
            update();
        }
        function saveGame(){localStorage.setItem("digiSave",JSON.stringify(digi)); alert("Saved!");}
        function load(){const s=localStorage.getItem("digiSave"); if(s) digi=JSON.parse(s); update();}
        setInterval(update,30000);
        window.onload = load;
    </script>
</body>
</html>
